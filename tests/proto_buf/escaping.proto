edition = "2023";
package escaping;

enum EnumStrippedPrefix {
  option features.json_format = LEGACY_BEST_EFFORT;

  // Same as unstripped value, not stripped
  ENUM_STRIPPED_PREFIX_FOO = 0;
  // Cannot be stripped - identifier starts with digit
  ENUM_STRIPPED_PREFIX_23_B = 1;
  // Not prefixed
  NOT_STRIPPED_PREFIX = 2;
  // No issues
  ENUM_STRIPPED_PREFIX_FOO_BAR = 3;
  // Same as other stripped value
  FOO = 4;
  // We don't uppercase so no conflict.
  Foo = 5;
}

enum EnumStrippedPrefix2 {
  option features.json_format = LEGACY_BEST_EFFORT;

  // Same prefix with different casing
  ENUM_STRIPPED_PREFIX2_FOO = 0;
  enum_stripped_prefix2_FOO = 1;
}
