edition = "2023";

import "enums.proto";

// Custom json_name on various field kinds.
message JsonNames {
  message Msg {
    string value = 1;
  }

  int32 scalar_field = 1 [json_name = "scalarFieldJsonName"];
  repeated string repeated_field = 2 [json_name = "repeatedFieldJsonName"];
  map<string, int32> map_field = 3 [json_name = "mapFieldJsonName"];
  Color enum_field = 4 [json_name = "enumFieldJsonName"];
  Msg msg_field = 5 [json_name = "msgFieldJsonName"];

  oneof value {
    string oneof_string = 6 [json_name = "oneofStringJsonName"];
    int32 oneof_int = 7 [json_name = "oneofIntJsonName"];
  }
}

// Edge case json_name values.
message JsonNameEdgeCases {
  int32 at_type = 1 [json_name = "@type"];
  int32 hyphen = 2 [json_name = "foo-bar"];
  int32 starts_with_digit = 3 [json_name = "1foo"];
  int32 empty = 4 [json_name = ""];
  int32 same_as_proto = 5 [json_name = "same_as_proto"];
  int32 special_chars = 6 [json_name = "Foo123_bar$"];
  int32 backslash = 7 [json_name = "\\"];
}
