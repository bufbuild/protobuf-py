edition = "2023";

import "enums.proto";

message Maps {
  message Msg {
    string value = 1;
  }

  // Every valid key type, one field each.
  map<int32, int32> int32_to_int32 = 1;
  map<int64, int64> int64_to_int64 = 2;
  map<uint32, uint32> uint32_to_uint32 = 3;
  map<uint64, uint64> uint64_to_uint64 = 4;
  map<sint32, sint32> sint32_to_sint32 = 5;
  map<sint64, sint64> sint64_to_sint64 = 6;
  map<fixed32, fixed32> fixed32_to_fixed32 = 7;
  map<fixed64, fixed64> fixed64_to_fixed64 = 8;
  map<sfixed32, sfixed32> sfixed32_to_sfixed32 = 9;
  map<sfixed64, sfixed64> sfixed64_to_sfixed64 = 10;
  map<bool, bool> bool_to_bool = 11;
  map<string, string> string_to_string = 12;

  // Additional value types.
  map<string, float> string_to_float = 13;
  map<string, double> string_to_double = 14;
  map<string, bytes> string_to_bytes = 15;
  map<string, Color> string_to_enum = 16;
  map<string, Msg> string_to_msg = 17;

  // Cross key/value combinations.
  map<int32, Color> int32_to_enum = 18;
  map<int32, Msg> int32_to_msg = 19;
  map<bool, Msg> bool_to_msg = 20;
  map<string, Maps> string_to_recursive = 21;
}
