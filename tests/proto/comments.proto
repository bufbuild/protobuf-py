syntax = "proto3";
package comments;

// Documentation of message 1
// other line 1

// Documentation of message 2
// other line 2
// A comment with backslashes \ and triple quotes """
// Simple quotes are not escaped "
message MessageWithComments { // Documentation of message 3
  // Documentation of field 1
  // other line 1

  // Documentation of field 2
  // other line 2
  uint32 x = 1; // Documentation of field 3

  // Documentation of oneof 1 / other line 1
  // Documentation of oneof 2 / other line 2
  oneof oneof_example { // Documentation of oneof 3
    // Documentation of oneof field 1 / other line 1
    // Documentation of oneof field 2 / other line 2
    int32 a = 2; // Documentation of oneof field 3
  }

  // Documentation of nested message 1 / other line 1
  // Documentation of nested message 2 / other line 2
  message NestedMessage { // Documentation of nested message 3
    // Documentation of nested field 1 / other line 1
    // Documentation of nested field 2 / other line 2
    string name = 1; // Documentation of nested field 3
  }

  // Documentation of nested enum 1 / other line 1
  // Documentation of nested enum 2 / other line 2
  enum NestedEnum { // Documentation of nested enum 3
    // Documentation of nested variant 1 / other line 1
    // Documentation of nested variant 2 / other line 2
    Enum_Variant = 0; // Documentation of nested variant 3
  }
}

// Documentation of enum 1 / other line 1
// Documentation of enum 2 / other line 2
enum EnumWithComments { // Documentation of enum 3
  // Documentation of variant 1 / other line 1
  // Documentation of variant 2 / other line 2
  Enum_Variant = 0; // Documentation of variant 3
}
