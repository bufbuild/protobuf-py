edition = "2023";

option features.message_encoding = DELIMITED;

message DelimitedEncoding {
  message Msg {
    int32 value = 1;
    Msg child = 2;
  }

  string name = 1;
  Msg singular = 2;
  repeated Msg repeated = 3;
  Msg length_prefixed = 4 [features.message_encoding = LENGTH_PREFIXED];
  map<string, Msg> message_map = 5;
  map<string, int32> scalar_map = 6;

  oneof choice {
    string choice_string = 7;
    Msg choice_message = 8;
  }
}
