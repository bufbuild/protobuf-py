edition = "2023";

enum Color {
  COLOR_UNSPECIFIED = 0;
  COLOR_RED = 1;
  COLOR_GREEN = 2;
  COLOR_BLUE = 3;
}

enum ClosedColor {
  option features.enum_type = CLOSED;
  CLOSED_COLOR_UNSPECIFIED = 0;
  CLOSED_COLOR_RED = 1;
  CLOSED_COLOR_GREEN = 2;
  CLOSED_COLOR_BLUE = 3;
}

message EnumMessage {
  Color color_field = 1;
  ClosedColor closed_color_field = 2;
  repeated Color color_list = 3;
  repeated ClosedColor closed_color_list = 4;
  map<string, Color> string_to_color = 5;
  map<string, ClosedColor> string_to_closed_color = 6;
}
