[project]
name = "upstream-protobuf"
version = "0.0.1"
requires-python = ">=3.10"
dependencies = ["license-header", "protoc-runner==35.1"]

[project.scripts]
generate_bootstrap = "bufbuild.upstream_protobuf.generate_bootstrap:main"
generate_conformance = "bufbuild.upstream_protobuf.generate_conformance:main"
generate_protos = "bufbuild.upstream_protobuf.generate_protos:main"
generate_wkt = "bufbuild.upstream_protobuf.generate_wkt:main"

[build-system]
requires = ["uv_build>=0.11.2,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = ["bufbuild.upstream_protobuf"]
