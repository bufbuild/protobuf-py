syntax = "proto3";

package example;

// A user.
message User {
  // The first name of the user.
  string first_name = 1;
  // The last name of the user.
  string last_name = 2;
  // Whether the user is active.
  bool active = 3;
  // The User's manager.
  User manager = 4;
  // Locations for the User.
  repeated string locations = 5;
  // Projects.
  map<string, string> projects = 6;
}
