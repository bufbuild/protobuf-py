syntax = "proto3";

package user.v1;

// UserService demonstrates a service with both unary and streaming RPCs.
// The protoc-gen-rpc plugin only generates interfaces for unary methods.
service UserService {
  // Get a single user by ID.
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  // Create a new user.
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  // List users matching filters. This is a server-streaming RPC,
  // so it will be skipped by the protoc-gen-rpc plugin.
  rpc ListUsers(ListUsersRequest) returns (stream ListUsersResponse);
}

message User {
  string user_id = 1;
  string first_name = 2;
  string last_name = 3;
  bool active = 4;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message CreateUserRequest {
  User user = 1;
}

message CreateUserResponse {
  User user = 1;
}

message ListUsersRequest {
  bool active_only = 1;
}

message ListUsersResponse {
  repeated User users = 1;
}
