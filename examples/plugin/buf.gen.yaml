# Learn more: https://buf.build/docs/configuration/v2/buf-gen-yaml
version: v2
clean: true
inputs:
  - directory: proto
plugins:
  # Generate base message types.
  - local: protoc-gen-py
    out: tests/gen
  # Generate RPC protocol interfaces with our custom plugin.
  - local: protoc-gen-rpc
    out: tests/gen
